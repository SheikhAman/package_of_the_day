name: package_of_the_day
description: "100+ Flutter packages explored daily with hands-on examples, real-world use cases, and beginner-friendly implementations."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # --- Components & Indicators ---
  avatar_glow: ^3.0.1

  # For accessing all Google fonts
  google_fonts: ^8.2.0

  # For fancy pull to refresh
  liquid_pull_to_refresh: ^3.0.1

  # For percentage indicator
  percent_indicator: ^4.2.5

  # For Carousel Swipe
  flutter_carousel_slider: ^1.1.0

  # For cute & fun dot indicator
  smooth_page_indicator: ^2.0.1

  # For awesome icons
  font_awesome_flutter: ^11.0.0

  # For pre-built Animations
  animations: ^2.2.0

  # For Neon signs
  neon: ^0.1.0

  # For Aurora gradient
  aurora: ^1.0.0

  # For card swiping effects
  card_swiper: ^3.0.1

  # For displaying blur image while loading
  flutter_blurhash: ^0.9.1

  # For  rendering SVG image
  flutter_svg: ^2.3.0

  # For various custom shapes
  flutter_custom_clippers: ^2.1.0

  # For Text-to-speech in flutter
  flutter_tts: ^4.2.5

  # For Code highlight
  flutter_highlight: ^0.7.0

  # For Drawing charts
  syncfusion_flutter_charts: ^34.1.32

  # For displaying alert pop-up
  rflutter_alert: ^2.0.7

  # For setting ui for both android & iOS
  flutter_settings_ui: ^3.0.1

  # For animated loading indicators
  flutter_spinkit: ^5.2.2

  # For playing audio files
  audioplayers: ^6.7.1

  # For easy-to-use navigation
  go_router: ^17.3.0

  # For making HTTP request
  http: ^1.6.0

  # For landing page
  onboarding: ^4.0.2

  # For neumorphic UI design
  flutter_neumorphic_plus: ^3.5.0

  # For parsing and evaluating mathematical expressions
  math_expressions: ^3.1.0

  # For modern neumorphic containers
  clay_containers: ^0.3.4

  # For dark mode switch
  day_night_switch: ^1.0.4

  # For State-management
  provider: ^6.1.5+1

  # For using Lucide Icon pack
  flutter_lucide: ^1.11.0

  # For gradient text
  simple_gradient_text: ^1.4.0

  # For picking images from the image library, and taking new pictures with the camera
  image_picker: ^1.2.3



dev_dependencies:
  flutter_test:
    sdk: flutter


flutter:
  uses-material-design: true

  assets:
    - assets/


